name: Build and Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore test project
        run: dotnet restore backend/Zon.SocialFeed.Api.Tests/Zon.SocialFeed.Api.Tests.csproj

      - name: Build backend
        run: dotnet build backend/Zon.SocialFeed.Api/Zon.SocialFeed.Api.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/Zon.SocialFeed.Api.Tests/Zon.SocialFeed.Api.Tests.csproj --configuration Release --no-build

      - name: Publish backend
        run: dotnet publish backend/Zon.SocialFeed.Api/Zon.SocialFeed.Api.csproj --configuration Release --output backend/published

      - name: Deploy backend to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: backend/published
